{% extends 'layouts/content.html' %}
{% block content %}
<div class="cotizacion">
  <link href="/static/assets/plugins/amcharts/amcharts.css" media="screen" rel="stylesheet"/>
<div class="table-responsive">
  <table class="table table-bordered table-striped" style="margin-bottom: 10px;">
    <thead>
    <tr>
      <th><h5>Símbolo</h5></th>
      <th><h5>Precio ($)</h5></th>
      <th><h5>Cambio ($)</h5></th>
      <th><h5>Rango del día ($)</h5></th>
      <th><h5>Volumen (núm. de acciones)</h5></th>

    </tr>
    </thead>
    <tbody>
    <tr>
      <td>CADUA</td>
      <td id="table-price"></td>
      <td id="table-change"></td>
      <td id="table-range"></td>
      <td id="table-volume"></td>
    </tr>

    </tbody>
  </table>
   <small id="table-date"></small>
  <br>
  <small>*Información con al menos 20 minutos de retraso, sólo para fines de referencia</small>
</div>

<br>
<div id="chartdiv3" style="width:100%; height:400px; clear: all"></div>
<div class="space80"></div>
<br>
<script type="text/javascript" src="/static/assets/plugins/jquery.min.js"></script>
<script src="/static/assets/plugins/amcharts/amcharts.js" type="text/javascript"></script>
<script src="/static/assets/plugins/amcharts/serial.js" type="text/javascript"></script>
<script src="/static/assets/plugins/amcharts/amstock.js" type="text/javascript"></script>
<script src="/static/assets/plugins/amcharts/pie.js" type="text/javascript"></script>
<script src="/static/assets/plugins/amcharts/themes/iredge.js?v=rebrand1" type="text/javascript"></script>
<script src="/static/assets/plugins/amcharts/dashboard.js?v=1.3"></script>
</div>

{% endblock %}
